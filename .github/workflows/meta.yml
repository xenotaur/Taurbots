name: meta

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install workflow validation dependency
        run: python -m pip install "PyYAML>=6.0"
      - name: Validate workflows
        run: scripts/check-workflows
